<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Fixed Layout Website</title>
    <!-- FontAwesome Icons for modern looking buttons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .center-menu-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: 600;
            color: #ffffff; /* Text ka color white rakhne ke liye */
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer; /* Clickable look dene ke liye */
        }

        .center-menu-text i {
            color: #10b981; /* House icon ko wahi pehle wala green color dene ke liye */
        }
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* FIXED: Blurred Cafe Scene Background with Premium Dark Overlay */
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            overflow: hidden; /* Stops whole page scrolling - Essential for mobile layout lock */
        }
        /* 1. Header Styling (Locked at Top) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(30, 41, 59, 0.85); /* Glassmorphism effect */
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* NEW: Premium Blinking Offer Bar (Right below Header) */
        .offer-ticker-bar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: 35px;
            background: rgba(239, 68, 68, 0.15); /* Soft red tech premium glow */
            border-bottom: 1px solid rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .ticker-text {
            font-size: 14px;
            font-weight: 700;
            color: #f87171; /* Eye-catching light red/coral accent */
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            animation: pulseBlink 1.5s infinite alternate; /* Continuous smooth blinking */
            transition: all 0.5s ease-in-out;
        }

        @keyframes pulseBlink {
            0% { opacity: 0.3; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 2. Filter Bar (Fixed right below Offer bar) */
        .filter-bar {
            position: fixed;
            top: 105px; /* 70px Header + 35px Offer Ticker */
            left: 0;
            width: 100%;
            height: 55px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 40px 10px 20px;
            z-index: 999;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: flex-end;
        }

        .jump-select {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 14px;
            width: 220px;
        }

        /* 3. Main Body Area (Adjusted top to lock accurately below Filter Bar) */
        main {
            position: absolute;
            top: 160px; /* 70px + 35px + 55px perfectly calculated */
            bottom: 70px; /* Locked above footer */
            left: 0;
            width: 100%;
            overflow-y: auto; /* Enables scrolling inside the body */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Adds space between images so they can scroll */
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar for sleek look */
        main::-webkit-scrollbar {
            width: 6px;
        }
        main::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* === PREMIUM RIGHT SIDE SLIDE-IN CSS === */
        .image-container {
            width: 100%;
            max-width: 500px; /* Perfect laptop and mobile fitting width */
            background: #1e293b;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            
            /* Initial State: Thoda right side me shift aur low opacity */
            opacity: 0.1;
            transform: translateX(50px) scale(0.97);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* === PREMIUM RIGHT SIDE SLIDE-IN CSS (UPDATED) === */
.image-container {
    width: 100%;
    max-width: 500px; 
    background: #1e293b;
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.05);
    
    /* Pehle opacity 0.1 thi jisse image hide ho rhi thi, ab ise 1 kar diya hai */
    opacity: 1; 
    transform: translateX(30px) scale(0.98); /* Thoda sa right side offset position */
    transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Active State: Scroll hone par image smoothly apni sateek jagah par slide karegi */
.image-container.active {
    opacity: 1;
    transform: translateX(0) scale(1);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    border-color: rgba(59, 130, 246, 0.2); 
}

        .image-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .animated-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        /* 4. Footer Styling (Locked at Bottom) */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            z-index: 1000;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.5);
        }

        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            flex: 1;
            height: 100%;
        }

        .footer-btn i {
            font-size: 20px;
            margin-bottom: 4px;
            transition: transform 0.2s ease;
        }

        .footer-btn:hover {
            color: #3b82f6;
        }
        .footer-btn:hover i {
            transform: translateY(-3px);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .header-btn {
                padding: 8px 12px;
                font-size: 14px;
            }
            .jump-select {
                font-size: 12px;
                width: 180px;
            }
            .ticker-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER (LOCKED AT TOP) -->
    <header>
        <!-- Center Menu Button (Reset view and scroll to top) -->
        <span class="center-menu-text" onclick="resetView()"><i class="fa-solid fa-house"></i> Menu</span>
        <div style="width: 40px;"></div>
    </header>

    <!-- NEW: DYNAMIC BLINKING OFFER BAR -->
    <div class="offer-ticker-bar">
        <span class="ticker-text" id="offerTicker">
            <i class="fa-solid fa-fire-flame-curved"></i> 50% Off
        </span>
    </div>

    <!-- LIVE FILTER BAR -->
    <div class="filter-bar">
        <select id="jumpMenu" class="jump-select" onchange="jumpToImage(this.value)">
            <option value="">MENU Options</option>
            <option value="img-delhi">Delhi Tour Visual</option>
            <option value="img-mumbai">Mumbai Express Visual</option>
            <option value="img-premium">Premium Special Offer</option>
            <option value="img-luxury">Luxury Resort Package</option>
        </select>
    </div>

    <!-- MAIN BODY AREA (SCROLLABLE) -->
    <main id="main-content">
        
        <!-- IMAGE CARD 1 -->
        <div class="image-container active" id="img-delhi" data-name="delhi tour visual">
            <div class="image-title"><i class="fa-solid fa-image"></i> Delhi Tour Visual</div>
            <img src="https://cdn.corenexis.com/f/xDk0KfsH68g.png" alt="menu 1" class="animated-image">
        </div>

        <!-- IMAGE CARD 2 -->
        <div class="image-container" id="img-mumbai" data-name="mumbai express visual">
            <div class="image-title"><i class="fa-solid fa-image"></i> Mumbai Express Visual</div>
            <img src="https://cdn.corenexis.com/f/xDk0KfsH68g.png" alt="menu 2" class="animated-image">
        </div>

        <!-- IMAGE CARD 3 -->
        <div class="image-container" id="img-premium" data-name="premium special offer">
            <div class="image-title"><i class="fa-solid fa-image"></i> Premium Special Offer</div>
            <img src="https://cdn.corenexis.com/f/xDk0KfsH68g.png" alt="menu 3" class="animated-image">
        </div>

        <!-- IMAGE CARD 4 -->
        <div class="image-container" id="img-luxury" data-name="luxury resort package">
            <div class="image-title"><i class="fa-solid fa-image"></i> Luxury Resort Package</div>
            <img src="https://cdn.corenexis.com/f/xDk0KfsH68g.png" alt="menu 4" class="animated-image">
        </div>

    </main>

    <!-- FOOTER (LOCKED AT BOTTOM) -->
    <footer>
        <a href="tel:+918800613274" class="footer-btn">
            <i class="fa-solid fa-phone"></i>
            <span>Call</span>
        </a>
        <a href="https://maps.google.com" target="_blank" class="footer-btn">
            <i class="fa-solid fa-location-dot"></i>
            <span>Map</span>
        </a>
        <a href="https://www.instagram.com/its_nanissss/" target="_blank" class="footer-btn">
            <i class="fa-brands fa-instagram"></i>
            <span>Instagram</span>
        </a>
        <a href="https://www.google.com/maps" class="footer-btn">
            <i class="fa-solid fa-star-half-stroke"></i>
            <span>Review</span>
        </a>
    </footer>

    <script>
        const cards = document.querySelectorAll('.image-container');
        const mainContent = document.getElementById('main-content');

        // --- MULTI-OFFER ROTATION LOGIC ---
        const offers = [
            '<i class="fa-solid fa-fire-flame-curved"></i> 50% Off',
            '<i class="fa-solid fa-gift"></i> Lucky Draw Offer',
            '<i class="fa-solid fa-crown"></i> Loyalty Membership available Berlin'
        ];
        let currentOfferIndex = 0;
        const tickerElement = document.getElementById('offerTicker');

        setInterval(() => {
            currentOfferIndex = (currentOfferIndex + 1) % offers.length;
            tickerElement.style.opacity = 0; // Smooth fade transition out
            
            setTimeout(() => {
                tickerElement.innerHTML = offers[currentOfferIndex];
                tickerElement.style.opacity = 1; // Smooth fade transition in
            }, 400);
        }, 3000); // Every 3 seconds offer will change smoothly

        // --- DYNAMIC SLIDE-IN FROM RIGHT FUNCTION ---
        function triggerSlideAnimation() {
            const triggerPoint = mainContent.clientHeight * 0.8; 

            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top - mainContent.getBoundingClientRect().top;

                if (cardTop < triggerPoint) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        mainContent.addEventListener('scroll', triggerSlideAnimation);
        window.addEventListener('load', triggerSlideAnimation);

        // Direct Quick Jump Dropdown Menu
        function jumpToImage(targetId) {
            if (!targetId) return;
            
            let targetElement = document.getElementById(targetId);
            if (targetElement) {
                setTimeout(() => {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetElement.classList.add('active');
                }, 50);
            }
            document.getElementById('jumpMenu').value = "";
        }

        // Reset view and back to top via Menu button
        function resetView() {
            document.getElementById('jumpMenu').value = "";
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(triggerSlideAnimation, 300);
        }
    </script>
</body>
</html>
